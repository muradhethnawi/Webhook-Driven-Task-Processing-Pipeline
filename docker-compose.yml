version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webhook_pipeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/src/db/migrate.js
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/webhook_pipeline
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/webhook_pipeline
      PORT: 3000
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/webhook_pipeline
      NODE_ENV: production
      WORKER_POLL_INTERVAL_MS: 2000
      WORKER_CONCURRENCY: 5
      DELIVERY_TIMEOUT_MS: 10000
      DELIVERY_MAX_RETRIES: 5
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
